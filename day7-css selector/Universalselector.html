<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Universal selector symbol is asterisk(*) */
        /* used to make changes for entire webpage */
        *{
            color: red;
            background-color: blueviolet;
        }
    </style>
</head>
<body>
    <h2 class="abc">Web Development</h2>

    <p id="note">This is Example of Universal selector</p>

    <button class="abc">Login</button>

    <p>/universal Selector</p>
</body>
</html>
