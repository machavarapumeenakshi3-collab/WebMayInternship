<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p{
            color: brown;
        }
        div .ex1{
            display: none;
        }

        div .ex2{
            display: block;
            background-color: bisque;
        }

        div .ex3{
            display: inline;
            background-color: blue;
        }
    </style>
</head>
<body>
    <div>
        Display : None, Means to show nothing/it will simply hide the content
        <p class="ex1">Hello Display None</p>
    </div>

    <div>
        Display : Block,It is similar to div container,Bcz it takes 100% width of the space
       <p class="ex2">Hello Display Block</p>
    </div>

    <div>
        Display : Inline,It is similar to Span tag,Bcz it takes required amount of width
       <p class="ex3">Hello Display Inline</p>
    </div>
</body>
</html>
