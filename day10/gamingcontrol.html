<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: black;
            color: white;
            font-family: Arial;
        }

        .title{
            text-align: center;
            color: aquamarine;
        }

        .playercard{
            display: block;
            background: #222;
            padding: 20px;
            border: 2px solid white;
            border-radius: 10px;
            margin-top: 20px;
        }

        .badge{
            display: inline;
            background: red;
            color: black;
            padding: 8px;
            margin-right: 12px;

        }

        .secret-message{
            display: none;
        }

        .game-container{
            display: flex;
            justify-content: center;
            gap: 200px;
            margin-top: 20px;

        }

        .game-card{
            background: #222;
            padding: 20px;
            width: 200px;
            border-radius: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1 class="title">Game Zone</h1>
    
    <!-- Block example -->
    <div class="playercard">
        <h2>Player:Shadow ninja</h2>
        <p>Level 99 Warrior</p>
    </div>

    <!-- Inline example -->
    <div class="badges">
        <span class="badge">Pro</span>
        <span class="badge">Fast</span>
        <span class="badge">Leader</span>
    </div>
    
    <div class="secret-message">
        Secret Weapon Unlocked
    </div>

    <div class="game-container">

        <div class="game-card">
            <h3>Minecraft</h3>
            <p>Building Adventure</p>
        </div>

        <div class="game-card">
            <h3>Valorant</h3>
            <p>Shooting Battle</p>
        </div>

        <div class="game-card">
            <h3>FIFA</h3>
            <p>Football Fun</p>
        </div>

    </div>


</body>
</html>
