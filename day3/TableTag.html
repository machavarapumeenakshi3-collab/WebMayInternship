<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- (table) - used to create a table, (tr) - used to add rows no.of (tr) = no.of rows, no cols tag like tc is there we just use (th) - tableheader to write no.of headings as per columns, (td) - used to write data in the table -->
     <!-- (border) - attribute used to create lines like a table measured by (px) - pixels -->
      <!-- (cellspacing)- each data is in a box called cell, cellspacing is used to create gaps b/w each cell i.e. box -->
       <!-- (cellpadding)- used to add space inside the cell to give space for to enter data -->
        <!-- (bgcolor) - used to add colour to table, we can also add color to each rows -->
         <!-- first we divide table using (thead) and (tbody) and use alignments and bgcolors for each -->
     <table border="2px" cellspacing="15px" cellpadding="15px" bgcolor="yellow">
        <thead align="left" bgcolor="pink"><tr>
            <th>Name</th>
            <th>Course</th>
            <th>City</th>
        </tr>
        </thead>

        <tbody>
        <tr>
            <td>Abhi</td>
            <td>AIML</td>
            <td>Vij</td>
        </tr>

        <tr>
            <td>Priya</td>
            <td>CSE</td>
            <td>USA</td>
        </tr>
        </tbody>
     </table>
</body>
</html>
