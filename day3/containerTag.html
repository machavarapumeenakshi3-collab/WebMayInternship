<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- (div) - like a containertag, used to seperate different contents, (div)tag uses 100% width of webpage, we can also change size just like imagetag -->
     <!-- (style) - used to add bgcolor to any tag -->
     <div style="background-color: red;">
        <h2>About Cafe</h2>
     </div>

     <div style="background-color: blue;">
        <h2>contact us</h2>
        <strong>Email</strong> <br>
        Call us at +12345
     </div>

     (span)-uses only data size opposite of divtag
     <span style="background-color: yellow;">Login</span>
     <button>Cart <span>0</span></button>



</body>
</html>
