<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- (form) - to create from like login page  -->
    <form>
        <h2>INSTAGRAM LOGIN</h2> <br>
        <label>Username</label> 
        <input type="text" required><sup>*</sup> <br>
        <!-- (sup)-to add any sign to show mandatory -->
        <label>Password</label> 
        <input type="password" required> <br>
        <!-- (required) - used to make sure some data is filled before submitting to give a warning if not -->
        <button type="submit">Login</button> <br>
        
    </form>
</body>
</html>
