<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- (video)-used to get videos from another website
    mp3-for audios
    mp4-for videos 
    (controls) - attribute used to play the video-->
    <video controls autoplay loop height="200" width="200">
        <source src="https://www.pexels.com/download/video/36606371/" type="video/mp4">
    </video>


    <audio controls>
        <!-- it will not show audip output on webpage if we  dont use control output -->
        <source src="./alec_koff-carnaval-484622.mp3" type="audio/mp3">
    </audio>
</body>
</html>
