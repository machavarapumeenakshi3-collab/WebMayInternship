<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label>Food</label>
    <input list="food">
    <!-- DATA LIST TAG -->
     <datalist id="food">
        <option value="pizza">
        <option value="fries">
        <option value="burger">
        <option value="killi">
     </datalist>

     <label>Location</label>
     <input list="city">
<datalist id="city">

<option value="mumbai">
<option value="bangalore">
<option value="chennai">
<option value="delhi">
<option value="hyderabad">

</datalist>
</body>
</html>
