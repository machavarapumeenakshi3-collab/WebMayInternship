<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Input is used to get data from user (input)- we just get a small box to enter data but we dont know what that box data is so we also use (label) tag along with (input) tag to indicate type of data-->
     <label>Username</label>
     <input type="text" placeholder="Enter your name">
     <!-- (placeholder attribute is used to place something inside the box) -->
      <label>E-mail</label>
      <input type="email" placeholder="Enter your e-mail"> <br>
      <!-- (type) - controls the input to guide the user -->
       <label>Password</label>
       <input type="password" placeholder="Enter your password">
       <label>DOB</label>
       <input type="date" placeholder="Enter your DOB">
       <label>Resume</label>
       <input type="file" placeholder="Input your file"> <br>

       <!-- (textarea) - used to get multiuple lines of input from user like movie reviews -->
        <!-- we use rows and columns to control size of box -->
        <textarea rows="3" cols="2"></textarea>
</body>
</html>
