<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>HOME PAGE</h1>
    <hr>
    <!-- (hr)-used to draw a horizontal line b/w lines -->
    <h1>CONTACT US</h1>
    <hr>
    <button>Login😭</button>
    <!-- (button)- used to add press buttons on web page  -->
    <!-- just choose emoji and add it -->
    <button>Register</button>
    <!-- (select) - used to create a select drop down box  -->
     <select>
        <option>Pizza</option>
        <option>Burger</option>
        <option disabled>Fries</option>
        <!-- (option disabled) -  used to disable an option, option is shown but we cannot select it -->
        <option selected>Food</option>
        <!-- (option selected) - used to pre select an option -->
         <option label="GIR">Great Indian Restaurant</option>
         <!-- (label)-is used to print shorter name of any name  -->
     </select>

     <!-- Anchor Tag (a) - To link other pages (href)-used to save addresses -->
      <a href="https://www.netflix.com/">Netflix</a>
      <a href="support.html">Support-Contact Us</a>

</body>
</html>
