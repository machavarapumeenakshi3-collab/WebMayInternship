<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- (listtag - used to make a list, 2 types of lists - ordered,unordered)
    (ol) - used to mke ordered list and (li) - used to write list -->
    <ol>
        <li>Bagpack</li>
        <li>lays</li>
        <li>shoes</li>
        <li><a href="support.html">Home</a></li>
        <!-- we can use anchor tag in listtag to connect webpages and make them a list at the sametime -->
    </ol>

    <!-- (ul) - used to mke ordered list and (li) - used to write list (we can also change type)-->
     <ul type="square">
        <!-- by default we only have square and circle in type -->
        <li>Bag</li>
        <li>shoes</li>
        <li>lays</li>
     </ul>

</body>
</html>
