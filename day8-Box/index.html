<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .product{
            border: 3px solid black;
            width: 250px;
            text-align: center;
            border-radius: 12px;
            /* padding - space inside the bordor */
            padding: 12px;
            /* margin - space outside the bordor */
            margin: 12px;
            background-color: rgb(56, 10, 10);
            /* box-shadow: Xaxis Yaxis shadowradius color; */
            box-shadow: 8px 8px 12px rgb(172, 84, 84);

        }

        .product:hover{
            box-shadow: 2px 4px 15px red;
            transition: 2s;
        }

        .product img{
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid white;
        
        }

        .product button{
            background-color: rgb(145, 145, 20);
            border: none;
            padding: 12px;
            border-radius: 12px;
            color: aliceblue;
        }

        .product h2{
            color: white;
        }
        .product p{
            color: white;
        }

        body{
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="product">
        <img src="https://images.pexels.com/photos/20204675/pexels-photo-20204675.jpeg" >
        <h2>Filter Coffee</h2>
        <p>Rs 150.00</p>
        <button>Buy Now</button>
    </div>

    <div class="product">
        <img src="https://images.pexels.com/photos/298485/pexels-photo-298485.jpeg" >
        <h2>Cookie</h2>
        <p>Rs 100.00</p>
        <button>Buy Now</button>
    </div>

    <div class="product">
        <img src="https://images.pexels.com/photos/14105/pexels-photo-14105.jpeg" >
        <h2>Cup cakes</h2>
        <p>Rs 50.00</p>
        <button>Buy Now</button>
    </div>

    <div class="product">
        <img src="https://images.pexels.com/photos/36925839/pexels-photo-36925839.jpeg" >
        <h2>Cold Coffee</h2>
        <p>Rs 200.00</p>
        <button>Buy Now</button>
    </div>
</body>
</html>
